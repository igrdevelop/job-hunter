name: Deploy Job Hunter
# docker-compose.yml is fetched via curl on deploy — no scp needed

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff==0.15.16
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.lock
      - name: Run tests
        # No --cov-fail-under yet (docs/quality/04-coverage-and-golden-e2e.md
        # Part A): map the blind spots for a few weeks before gating on them.
        run: pytest tests/ -q --cov=hunter --cov-report=xml --cov-report=term
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

  # Informational only (continue-on-error) — deploy does NOT depend on it yet.
  # Baseline as of 2026-07-15 (quality-06, docs/quality/06-static-gates-mypy-sonar.md
  # Этап 0): 223 errors in 54 files across `hunter/ llm_client.py generate_docs.py
  # apply_agent.py`. Becomes a blocking gate once that baseline is driven to zero
  # (Этап 1-2 of the plan — not done here).
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.lock
      - name: mypy
        continue-on-error: true
        run: mypy hunter/ llm_client.py generate_docs.py apply_agent.py

  # Informational only — deploy does NOT depend on it. Skips itself cleanly
  # until the repo is connected on sonarcloud.io and SONAR_TOKEN is added to
  # the repo secrets (free for public repos).
  sonarcloud:
    needs: [test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Check SONAR_TOKEN present
        id: sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SONAR_TOKEN not set — skipping SonarCloud scan"
          fi
      - uses: actions/checkout@v4
        if: steps.sonar.outputs.enabled == 'true'
        with:
          fetch-depth: 0  # full history for accurate new-code detection
      - name: Download coverage report
        if: steps.sonar.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml
      - name: SonarCloud scan
        if: steps.sonar.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-and-deploy:
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_WORK_DIR }}
            curl -fsSL https://raw.githubusercontent.com/igrdevelop/job-hunter/master/docker-compose.yml -o docker-compose.yml
            touch gsheets_state.json
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export IMAGE_TAG=${{ github.sha }}
            docker compose pull
            docker compose up -d
            docker image prune -f

      - name: Notify on failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ Job Hunter deploy FAILED
            Commit: ${{ github.sha }}
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}