# SonarCloud config (free for public repos). One-time setup:
#   1. Log in at https://sonarcloud.io with the GitHub account, import this repo.
#   2. Verify the projectKey/organization SonarCloud assigns matches the values
#      below (default GitHub import convention: <org>_<repo> / <org>).
#   3. In the SonarCloud project settings choose "CI-based analysis" (not
#      Automatic Analysis — both at once is an error).
#   4. Add SONAR_TOKEN to the GitHub repo secrets; the sonarcloud CI job
#      un-skips itself automatically.
sonar.projectKey=igrdevelop_job-hunter
sonar.organization=igrdevelop

sonar.sources=hunter,linkedin_scout,tools,apply_agent.py,generate_docs.py,llm_client.py,hunter.py
sonar.tests=tests
sonar.python.version=3.11
sonar.sourceEncoding=UTF-8
# Populated once the CI test-job publishes a coverage.xml artifact
# (docs/quality/04-coverage-and-golden-e2e.md); harmless no-op until then.
sonar.python.coverage.reportPaths=coverage.xml

# Generated/data dirs — never analyzed.
sonar.exclusions=Applications/**,backups/**,docs/**,prompts/**
