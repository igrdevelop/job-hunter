version: "3.9"

services:
  job-hunter:
    image: ghcr.io/igrdevelop/job-hunter:latest
    container_name: job-hunter
    restart: always
    env_file:
      - .env
    volumes:
      # tracker.db must exist on the host before first run.
      # If it doesn't exist Docker will auto-create a directory, breaking the tracker.
      # Fix: touch ./tracker.db  (the bot will initialise the schema on first start)
      - ./tracker.db:/app/tracker.db
      - ./tracker.xlsx:/app/tracker.xlsx
      - ./Applications:/app/Applications
      - ./backups:/app/backups
      - ./.secrets:/app/.secrets
      - ./gmail_credentials.json:/app/gmail_credentials.json
      - ./gmail_token.json:/app/gmail_token.json
      - ./gsheets_credentials.json:/app/gsheets_credentials.json
      - ./gsheets_token.json:/app/gsheets_token.json
      # WARNING: gsheets_state.json must be a FILE on the host before first run.
      # If it doesn't exist Docker will auto-create a directory, breaking GSheets sync.
      # Fix: touch ./gsheets_state.json  (or echo '{}' > ./gsheets_state.json)
      - ./gsheets_state.json:/app/gsheets_state.json
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"